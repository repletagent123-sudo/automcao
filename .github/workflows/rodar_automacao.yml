name: Executar Robo de Prospeccao

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  executar:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar codigo do repositorio
      uses: actions/checkout@v4

    - name: Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar OpenAI
      run: pip install openai

    - name: Rodar o script do Robo
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: python script_prospeccao.py

    - name: Salvar e Enviar arquivos para o GitHub
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add leads_qualificados.json
        git commit -m "Automacao: Relatorio gerado" || echo "Sem mudancas"
        git push
